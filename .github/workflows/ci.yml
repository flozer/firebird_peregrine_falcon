name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Check code compilation
      run: cargo check --all-targets

    - name: Run Clippy
      run: cargo clippy -- -D warnings

    # Full build requires Firebird client library
    # Users should build on systems with Firebird installed
    # - name: Build
    #   run: cargo build --release

